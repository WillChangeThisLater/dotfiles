#lynx.cfg
# export LYNX_CFG=$XDG_CONFIG_HOME/lynx/lynx.cfg

# stole this config from: zgracem/dotconfig

## Auxiliary Facilities

INCLUDE:/usr/local/lib/lynx.cfg
# this errors out for me
STARTFILE:https://news.ycombinator.com
# could not helpfile to build right
#HELPFILE:file://localhost/~/.config/lynx/helpfile.html
JUMPFILE:/home/paul/.config/lynx/jumpfile.html
# if a subdirectory under HOME is desired, the path should begin with "./"
DEFAULT_BOOKMARK_FILE:./.config/lynx/lynx_bookmarks.html

## Interaction
DEFAULT_USER_MODE:advanced
TEXTFIELDS_NEED_ACTIVATION:TRUE
LEFTARROW_IN_TEXTFIELD_PROMPT:TRUE
NO_DOT_FILES:FALSE

# vim keybindings
VI_KEYS:FALSE
KEYMAP:h:PREV_DOC
KEYMAP:j:DOWN_TWO
KEYMAP:k:UP_TWO
KEYMAP:l:NEXT_DOC
KEYMAP:G:END
KEYMAP:LTARROW:PREV_DOC
KEYMAP:RTARROW:NEXT_DOC
KEYMAP:UPARROW:PREV_LINK
KEYMAP:DNARROW:NEXT_LINK

## Timeouts

# (default for both is 18000 = 5 hours?!?!)
CONNECT_TIMEOUT:15
READ_TIMEOUT:15

## Internal Behavior

SAVE_SPACE:~/Downloads/
REFERER_WITH_QUERY:partial
ENABLE_LYNXRC:SHOW_DOTFILES:ON
ENABLE_LYNXRC:USERAGENT:ON

## Character Sets

CHARACTER_SET:utf-8
ASSUME_CHARSET:utf-8
ASSUME_LOCAL_CHARSET:utf-8
ASSUMED_DOC_CHARSET_CHOICE:utf-8
ASSUMED_DOC_CHARSET_CHOICE:us-ascii
ASSUMED_DOC_CHARSET_CHOICE:iso-8859-1
ASSUMED_DOC_CHARSET_CHOICE:iso-8859-15
ASSUMED_DOC_CHARSET_CHOICE:cp850
ASSUMED_DOC_CHARSET_CHOICE:windows-1252
ASSUMED_DOC_CHARSET_CHOICE:cp437
DISPLAY_CHARSET_CHOICE:utf-8
DISPLAY_CHARSET_CHOICE:us-ascii
DISPLAY_CHARSET_CHOICE:iso-8859-1
DISPLAY_CHARSET_CHOICE:iso-8859-15
DISPLAY_CHARSET_CHOICE:cp850
DISPLAY_CHARSET_CHOICE:windows-1252
DISPLAY_CHARSET_CHOICE:cp437

## Cookies
FORCE_SSL_COOKIES_SECURE:TRUE
PERSISTENT_COOKIES:TRUE
COOKIE_FILE:~/.local/share/lynx/lynx_cookies
COOKIE_SAVE_FILE:~/.local/share/lynx/lynx_cookies

## Appearance

MAKE_LINKS_FOR_ALL_IMAGES:TRUE
VERBOSE_IMAGES:TRUE
PRETTYSRC:TRUE

## External Programs

PERSONAL_MAILCAP:.config/mailcap/mailcap
EXTERNAL:magnet:open -a Transmission %s:TRUE:TRUE

# my (paul) changes...
SSL_CERT_FILE:/etc/ssl/certs/ca-certificates.crt

# custom keymaps
# stole these from: https://matrixcoffee.gitlab.io/assets/lynx/keymap
KEYMAP:0x20:DOWN_HALF		# Move display down half a page
KEYMAP:H:HISTORY		# Show the history list
KEYMAP:0x08:PREV_DOC		# Return to the previous document in history stack
KEYMAP:0x7F:PREV_DOC		# Return to the previous document in history stack

DEFAULT_KEYPAD_MODE:LINKS_AND_FIELDS_ARE_NUMBERED
NUMBER_LINKS_ON_LEFT:FALSE

RULE:Redirect https://www.reddit.com/* https://old.reddit.com/*

# fucking around with fail rules to block ads. does not work as well as i hoped
RULE:Fail ad.yieldmanager.com*
RULE:Fail *.ad.yieldmanager.com*
RULE:Fail http://ad.yieldmanager.com*
RULE:Fail https://ad.yieldmanager.com*
RULE:Fail http://*.ad.yieldmanager.com*
RULE:Fail https://*.ad.yieldmanager.com*

# auto open youtube links in mpv
# this requres 'mpv' to work
# lynx config parser is picky about colons in URLs; we need to escape them
EXTERNAL:https\://www.youtube.com:mpv '%s' &
EXTERNAL:https\://youtu.be:mpv '%s' &

# use llm + llm-url-markdown (https://github.com/saeedesmaili/llm-url-markdown) to summarize web links
# should figure out a nicer flow for this...
EXTERNAL:http:llm -f md\:'%s' "summarize this"
